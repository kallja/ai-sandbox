services:
  proxy:
    build: ./proxy
    ports:
      - "127.0.0.1:8081:8081" # mitmweb UI
      - "127.0.0.1:8080:8080" # proxy port
    networks:
      public:
      internal_only:
        aliases:
          - proxy.local
    volumes:
      - mitmproxy-data:/home/mitmproxy/.mitmproxy
      - shared-certs:/shared-certs

  claude-code:
    build: ./claude-code
    environment:
      - HTTP_PROXY=http://proxy.local:8080
      - HTTPS_PROXY=http://proxy.local:8080
      - http_proxy=http://proxy.local:8080
      - https_proxy=http://proxy.local:8080
      - NODE_EXTRA_CA_CERTS=/shared-certs/mitmproxy-ca-cert.pem
      - CLAUDE_CLI_SKIP_SETUP=true
    networks:
      - internal_only
    volumes:
      - shared-certs:/shared-certs:ro
      - .:/repo
      - claude-memory:/root/.claude/projects
    working_dir: /repo
    depends_on:
      - proxy

networks:
  internal_only:
    internal: true
  public:
    driver: bridge

volumes:
  mitmproxy-data:
  shared-certs:
  claude-memory:

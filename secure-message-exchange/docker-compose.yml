services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./testdata/relay-keys:/keys:ro
      - ./testdata/client-keys:/client-keys:ro
    command:
      - "--store=memory"
      - "--key-dir=/keys"
      - "--client-keys-dir=/client-keys"
      - "--pow-difficulty=8"

  alice:
    build:
      context: .
      dockerfile: Dockerfile.client
    volumes:
      - ./testdata/alice-keys:/keys:ro
      - ./testdata/alice-config.json:/config.json:ro
    depends_on:
      - relay
    entrypoint: ["/client"]

  bob:
    build:
      context: .
      dockerfile: Dockerfile.client
    volumes:
      - ./testdata/bob-keys:/keys:ro
      - ./testdata/bob-config.json:/config.json:ro
    depends_on:
      - relay
    entrypoint: ["/client"]

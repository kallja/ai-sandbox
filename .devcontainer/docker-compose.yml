services:
  claude:
    build:
      context: .
    environment:
      - HTTP_PROXY=http://proxy.local:8080
      - HTTPS_PROXY=http://proxy.local:8080
      - http_proxy=http://proxy.local:8080
      - https_proxy=http://proxy.local:8080
    networks:
      - internal_only
    volumes:
      - ..:/home/claude/repo
      - ${PWD}:${PWD}
      - claude-memory:/home/claude/.claude/projects
    working_dir: ${PWD}
    depends_on:
      - proxy

volumes:
  claude-memory:
